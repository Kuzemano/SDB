<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #f0f0f0;
            padding: 2rem; display: flex; flex-direction: column; align-items: flex-start; }
        h1 { color: #e10600; margin-bottom: 1.5rem; font-size: 1.6rem; }
        .form-card { background: #2a2a2a; padding: 2rem; border-radius: 8px;
            width: 100%; max-width: 480px; }
        label { display: block; margin-top: 1rem; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; }
        label:first-of-type { margin-top: 0; }
        input[type=text], input[type=number], select {
            width: 100%; padding: 9px 12px; margin-top: 4px;
            border: 1px solid #444; border-radius: 4px;
            background: #1a1a1a; color: #f0f0f0; font-size: 0.95rem; outline: none; }
        input:focus, select:focus { border-color: #e10600; }
        select option { background: #1a1a1a; }
        .row { display: flex; gap: 1rem; }
        .row > div { flex: 1; }
        .actions { display: flex; gap: 1rem; margin-top: 1.5rem; align-items: center; }
        .btn { padding: 9px 20px; background: #e10600; color: white; border: none;
            cursor: pointer; border-radius: 4px; font-size: 0.95rem; transition: background 0.2s; }
        .btn:hover { background: #b30000; }
        a.back { color: #aaa; text-decoration: none; font-size: 0.9rem; }
        a.back:hover { color: #f0f0f0; }
    </style>
</head>
<body>
<h1 th:text="${driver != null} ? '✏️ Edit Driver' : '➕ Add Driver'">Driver Form</h1>

<div class="form-card">
    <form th:action="${driver != null} ? @{/drivers/update/{id}(id=${driver.id})} : @{/drivers/save}"
          method="post">

        <label for="name">Full Name</label>
        <input id="name" type="text" name="name"
               th:value="${driver != null ? driver.name.value : ''}"
               placeholder="e.g. Max Verstappen" required/>

        <label for="teamName">Team</label>
        <input id="teamName" type="text" name="teamName"
               th:value="${driver != null ? driver.teamName.value : ''}"
               placeholder="e.g. Red Bull Racing" required/>

        <label for="nationality">Nationality</label>
        <input id="nationality" type="text" name="nationality"
               th:value="${driver != null ? driver.nationality.value : ''}"
               placeholder="e.g. Dutch" required/>

        <label for="racingNumber">Racing Number (1–99)</label>
        <input id="racingNumber" type="number" name="racingNumber" min="1" max="99"
               th:value="${driver != null ? driver.racingNumber.value : ''}" required/>

        <div class="row">
            <div>
                <label for="salary">Salary</label>
                <input id="salary" type="number" step="0.01" name="salary" min="0"
                       th:value="${driver != null ? driver.salary.amount : ''}" required/>
            </div>
            <div>
                <label for="salaryCurrency">Currency</label>
                <select id="salaryCurrency" name="salaryCurrency">
                    <option value="EUR" th:selected="${driver != null and driver.salary.currency.name() == 'EUR'}">EUR</option>
                    <option value="USD" th:selected="${driver != null and driver.salary.currency.name() == 'USD'}">USD</option>
                    <option value="GBP" th:selected="${driver != null and driver.salary.currency.name() == 'GBP'}">GBP</option>
                </select>
            </div>
        </div>

        <label for="championshipPoints">Championship Points</label>
        <input id="championshipPoints" type="number" name="championshipPoints" min="0"
               th:value="${driver != null ? driver.championshipPoints.value : ''}" required/>

        <label for="contractStartDate">Contract Start Date</label>
        <input id="contractStartDate" type="datetime-local" name="contractStartDate"/>

        <label for="contractEndDate">Contract End Date</label>
        <input id="contractEndDate" type="datetime-local" name="contractEndDate"/>

        <div class="actions">
            <button type="submit" class="btn">Save Driver</button>
            <a class="back" th:href="@{/drivers}">← Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
