<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>F1 Drivers</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #f0f0f0; padding: 2rem; }
        h1 { color: #e10600; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .toolbar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
        .toolbar form { display: flex; gap: 0.5rem; }
        input[type=text] { padding: 7px 12px; border: 1px solid #444; border-radius: 4px; background: #2a2a2a; color: #f0f0f0; outline: none; }
        input[type=text]:focus { border-color: #e10600; }
        .btn { padding: 7px 14px; background: #e10600; color: white; border: none; cursor: pointer; text-decoration: none; border-radius: 4px; font-size: 0.9rem; transition: background 0.2s; display: inline-block; }
        .btn:hover { background: #b30000; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover { background: #555; }
        table { width: 100%; border-collapse: collapse; background: #2a2a2a; border-radius: 8px; overflow: hidden; }
        thead tr { background: #e10600; }
        th { padding: 12px 14px; text-align: left; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; }
        td { padding: 11px 14px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #333; }
        .actions { display: flex; gap: 0.5rem; }
        .points-badge { background: #e10600; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
<h1>🏎️ F1 Driver Management</h1>

<div class="toolbar">
    <form th:action="@{/drivers}" method="get">
        <input type="text" name="nameSearch" placeholder="Search by driver name"/>
        <button type="submit" class="btn">Search</button>
    </form>
    <form th:action="@{/drivers}" method="get">
        <input type="text" name="teamSearch" placeholder="Search by team"/>
        <button type="submit" class="btn btn-secondary">Search</button>
    </form>
    <a class="btn" th:href="@{/drivers/add}">+ Add Driver</a>
    <a class="btn btn-secondary" th:href="@{/drivers}">Show All</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Team</th>
        <th>Nationality</th>
        <th>#</th>
        <th>Salary</th>
        <th>Cur.</th>
        <th>Points</th>
        <th>Actions</th>
        <th>Contract Start</th>
        <th>Contract End</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="driver : ${drivers}">
        <td th:text="${driver.id}"></td>
        <td th:text="${driver.name.value}"></td>
        <td th:text="${driver.teamName.value}"></td>
        <td th:text="${driver.nationality.value}"></td>
        <td th:text="${driver.racingNumber.value}"></td>
        <td th:text="${#numbers.formatDecimal(driver.salary.amount, 1, 2)}"></td>
        <td th:text="${driver.salary.currency}"></td>
        <td th:text="${driver.contractStartDate}"></td>
        <td th:text="${driver.contractEndDate}"></td>
        <td><span class="points-badge" th:text="${driver.championshipPoints.value}"></span></td>
        <td>
            <div class="actions">
                <a class="btn" th:href="@{'/drivers/edit/' + ${driver.id}}">Edit</a>
                <form th:action="@{'/drivers/delete/' + ${driver.id}}" method="post">
                    <button type="submit" class="btn btn-secondary"
                            onclick="return confirm('Delete this driver?')">Delete</button>
                </form>
            </div>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(drivers)}">
        <td colspan="9" style="text-align:center; padding: 2rem; color: #888;">No drivers found.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
